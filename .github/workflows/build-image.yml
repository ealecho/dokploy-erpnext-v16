name: Build ERPNext + Healthcare image

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - custom-image/**
      - .github/workflows/build-image.yml

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Checkout frappe_docker
        uses: actions/checkout@v4
        with:
          repository: frappe/frappe_docker
          path: frappe_docker

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: frappe_docker
          file: frappe_docker/images/layered/Containerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/erpnext-healthcare:version-16
            ghcr.io/${{ github.repository_owner }}/erpnext-healthcare:v16-${{ github.run_number }}
          build-args: |
            FRAPPE_BRANCH=version-16
          secret-files: |
            apps_json=./custom-image/apps.json
